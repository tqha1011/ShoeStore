name: Frontend SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  detect-change:
    name: Scan File Changes
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      is_frontend_changed: ${{ steps.filter.outputs.frontend_code }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend_code:
              - 'Frontend/**'

  build-and-analyze:
    needs: detect-change
    if: needs.detect-change.outputs.is_frontend_changed == 'true'
    name: Frontend Build and Analyze
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Bắt buộc phải có để SonarCloud tính toán được New Code
          sparse-checkout: |
            Frontend
            
      - name: Debug files
        working-directory: .
        run: ls -la

      # Gom gọn toàn bộ sức mạnh Cache vào đúng 1 dòng này (Xóa cục manual cache cũ)
      - name: Setup Java & Auto-Cache Gradle
        uses: actions/setup-java@v4
        with:
          java-version: 17 # Đổi thành 21 nếu sau này ép version Android cao hơn
          distribution: 'zulu' 
          cache: 'gradle' 

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Thêm assembleDebug để compile mã nguồn trước khi SonarQube soi mói
      - name: Build and Analyze with Gradle
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        run: |
          ./gradlew assembleDebug sonarqube -Dsonar.coverage.exclusions="**/*" \
            -Dsonar.projectKey=tqha1011_ShoeStore_Frontend \
            -Dsonar.organization=tqha1011 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN
