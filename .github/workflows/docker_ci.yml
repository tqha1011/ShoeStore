name: Docker Build & Push Image

on:
  push:
    branches:
      - "main"
      - "develop"
    paths:
      # Chỉ chạy khi có thay đổi code API hoặc Dockerfile
      - 'Backend/src/**'
      - 'Backend/src/ShoeStore.Api/Dockerfile'
      - '!**.md'
      - '!**.txt'

jobs:
  build_and_push:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 1. Cài đặt Buildx để tận dụng cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} 

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shoestore-api
          tags: |
            # Nếu là nhánh main -> Đặt tag là 'latest'
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Nếu là nhánh develop -> Đặt tag là 'dev'
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}

      # 3. Build và Push 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Backend/src/ShoeStore.Api # Đường dẫn chứa code
          file: ./Backend/src/ShoeStore.Api/Dockerfile # Đường dẫn file Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }} # Lấy kết quả của Docker Meta
          # Bật Cache để lần sau build nhanh hơn
          cache-from: type=gha
          cache-to: type=gha,mode=max
