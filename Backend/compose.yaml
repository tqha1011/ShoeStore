services:
  shoestore.api:
    image: hatranquang2006/shoestore-api:${TAG:-latest}
    container_name: ShoeStore_api
    build:
      context: .
      dockerfile: src/ShoeStore.Api/Dockerfile
      target: build
    
    command:
      dotnet watch run --no-hot-reload
    
    env_file:
      - .env
    
    environment:
      - ASPNETCORE_URLS=http://+:8080
    
    ports:
      - "8080:8080"
    networks:
      - shoestore-frontend
      - shoestore-backend
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    develop:
      watch:
        - action: sync
          path: ./src
          target: ./src
  
  cache:
    image: redis:8.6.1-alpine
    container_name: shoestore_cache
    networks:
      - shoestore-backend
    
    volumes:
      - redis_shoestore_data:/data
    command:
      redis-server --requirepass ${REDIS_PASSWORD}


networks:
  shoestore-frontend:
    driver: bridge
  shoestore-backend:
    driver: bridge
    
volumes:
  redis_shoestore_data:

