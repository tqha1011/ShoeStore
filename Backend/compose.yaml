services:
  shoestore.api:
    image: hatranquang2006/shoestore-api:${TAG:-latest}
    container_name: ShoeStore_api
    build:
      context: .
      dockerfile: src/ShoeStore.Api/Dockerfile
      target: build
    
    command:
      dotnet watch run --no-hot-reload
    
    env_file:
      - .env
    
    environment:
      - ASPNETCORE_URLS=http://+:8080
    
    ports:
      - "8080:8080"
    networks:
      - shoestore-frontend
      - shoestore-backend
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    develop:
      watch:
        - action: sync
          path: ./src
          target: ./src
  
  cache:
    image: redis:8.6.1-alpine
    container_name: shoestore_cache
    networks:
      - shoestore-backend
    
    volumes:
      - redis_shoestore_data:/data
    command:
      redis-server --requirepass ${ConnectionStrings__RedisPassword}
    
  prometheus:
    image: prom/prometheus:latest
    container_name: shoestore_prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - shoestore-backend
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
  
  grafana:
    image: grafana/grafana:latest
    container_name: shoestore_grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
      - shoestore-backend
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  shoestore-frontend:
    driver: bridge
  shoestore-backend:
    driver: bridge
  monitoring:
    driver: bridge
    
volumes:
  redis_shoestore_data:
  grafana_data:
  

