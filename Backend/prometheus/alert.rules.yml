groups:
  - name: shoe-store-api-alerts
    rules:
      - alert: InstanceDown
        expr: up{job="shoestore-prometheus"} == 0
        for: 1m # Alert will fire if the instance is down for more than 1 minute
        labels:
          severity: critical
        annotations:
          summary: "Server {{ $labels.instance }} down"
          description: "The instance {{ $labels.instance }} has been down for more than 1 minutes."
      
      - alert: HighRequestLatency
        expr: rate(http_request_duration_seconds_sum[1m]) / rate(http_request_duration_seconds_count[1m]) > 2.0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High request latency on {{ $labels.instance }}"
          description: "The average request latency on api has been above 2 seconds for more than 1 minute."