server{
    listen 80;
    server_name localhost;
    resolver 8.8.8.8 127.0.0.11 ipv6=off valid=30s;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api {
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
    }

    location /api/auth/signin {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
    }
    
    location /api/auth/signup {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
    }
    
    location /scalar {
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
    }
    
    location /_framework {
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
    }
    
    location /openapi {
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
   }
   
   # configure for SignalR hub notifications
   location /hubs/agent/notify {
        proxy_pass $backend_upstream;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_socket_keepalive on; # keep the connection alive for SignalR
        proxy_set_header Upgrade $http_upgrade; # handle WebSocket upgrade
        proxy_set_header Connection $connection_upgrade; # handle WebSocket upgrade
        proxy_cache off; # disable caching for WebSocket connections
        proxy_set_header Host $proxy_host;
        proxy_read_timeout 3600s; # increase read timeout for long-lived WebSocket connections
        proxy_send_timeout 3600s; # increase send timeout for long-lived WebSocket connections
        proxy_ssl_server_name on;
   }
   
   # configure for SignalR hub notifications
   location /hubs/agent/notify {
        proxy_pass http://backend;  # proxies requests to the backend upstream
        proxy_http_version 1.1;
        proxy_socket_keepalive on; # keep the connection alive for SignalR
        proxy_set_header Upgrade $http_upgrade; # handle WebSocket upgrade
        proxy_set_header Connection $connection_upgrade; # handle WebSocket upgrade
        proxy_cache off; # disable caching for WebSocket connections
        proxy_set_header Host $host; # pass the original host header
        proxy_read_timeout 3600s; # increase read timeout for long-lived WebSocket connections
        proxy_send_timeout 3600s; # increase send timeout for long-lived WebSocket connections
   }
}